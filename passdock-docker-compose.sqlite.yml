services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: ""
        VITE_LOCAL_DEMO_MODE: "false"
        VITE_ADMIN_BEARER_TOKEN: ""
    image: ${PASSDOCK_WEB_IMAGE:-passdock/web:local}
    container_name: passdock-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${PASSDOCK_WEB_PORT:-8080}:80"

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: ${PASSDOCK_SERVER_IMAGE:-passdock/server:local}
    container_name: passdock-server
    restart: unless-stopped
    env_file:
      - path: ./passdock.env
        required: false
    environment:
      APP_PORT: 8080
      DB_DRIVER: sqlite
      SQLITE_PATH: /app/data/passdock.db
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/storage
    ports:
      - "${PASSDOCK_SERVER_PORT:-18080}:8080"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage

  minio:
    image: minio/minio:latest
    container_name: passdock-minio
    restart: unless-stopped
    profiles:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-passdock}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-replace_me_minio}
    command: server /data --console-address ":9001"
    ports:
      - "${PASSDOCK_MINIO_API_PORT:-19000}:9000"
      - "${PASSDOCK_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - ./minio-data:/data

networks:
  default:
    name: passdock-sqlite
